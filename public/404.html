<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Redirect all paths to index.html for client-side routing
      // Encodes the path as a query param so the SPA can restore it
      var base = '/march-madness-viewer-guide/'
      var path = location.pathname.replace(base, '')
      location.replace(base + '?' + path)
    </script>
  </head>
  <body></body>
</html>
